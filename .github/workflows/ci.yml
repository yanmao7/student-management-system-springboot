name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  mvn-build:
    name: Maven Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean verify

  docker-compose:
    name: Docker Compose
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Run docker-compose
        run: docker compose up -d --build

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            docker compose exec -T db mysqladmin ping -h localhost -u root -proot && break || sleep 2
          done
        
      - name: Wait for app
        run: |
          for i in {1..60}; do
            curl -f http://localhost:8080/actuator/health && break || sleep 2
          done
        
      - name: Show container logs
        if: always()
        run: docker compose logs

      - name: Check service
        run: curl -fL http://localhost:8080

      - name: Tear down containers
        if: always()
        run: docker compose down -v
